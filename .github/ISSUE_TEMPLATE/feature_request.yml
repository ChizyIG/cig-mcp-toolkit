name: Feature request
description: Propose new functionality, a new reference server, or a schema addition
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. For substantial proposals (a new reference server, a schema change, new public API surface), please use this template to give us enough context to align on scope before anyone writes code.
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to accomplish? Who is this for? What is awkward or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should exist? Sketch the API, CLI, server tools/resources, or schema. Pseudocode is welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you ruled out, and why.
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - "Core library (cig_mcp / cig-mcp)"
        - "New reference server"
        - "Existing reference server"
        - "Schema / data model"
        - "Tooling / docs"
        - "Other"
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: This does not rely on proprietary data, models, or non-public data feeds.
          required: true
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I'm open to discussion on scope before implementation begins.
          required: true
